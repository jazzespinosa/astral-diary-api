name: Deploy to OCI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest  # Build machine (x64)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish for Linux ARM64
        run: |
          dotnet publish \
            --configuration Release \
            --runtime linux-arm64 \
            --self-contained false \
            --output ./publish

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'placeholder'

      - name: Add known hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Debug - Check current user
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "whoami"
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "id"
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "pwd"

      - name: Deploy to OCI Server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "sudo systemctl stop astral-diary-api.service"
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "if [ -f /var/www/astral-diary-api/appsettings.Production.json ]; then cp /var/www/astral-diary-api/appsettings.Production.json /tmp/; fi"
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "rm -rf /var/www/astral-diary-api/*"
          rsync -avz --delete ./publish/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/astral-diary-api/
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "if [ -f /tmp/appsettings.Production.json ]; then cp /tmp/appsettings.Production.json /var/www/astral-diary-api/ && rm /tmp/appsettings.Production.json; fi"
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "chmod -R 755 /var/www/astral-diary-api"
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "sudo systemctl daemon-reload && sudo systemctl start astral-diary-api.service"

      - name: Check deployment status
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "sudo systemctl status astral-diary-api.service --no-pager"

      - name: Health check
        run: |
          sleep 5
          curl -f http://${{ secrets.SSH_HOST }}:5000/health || exit 1